name: Weekly Backup

on:
  schedule:
    # 매주 토요일 09:00 UTC = 매주 토요일 18:00 한국시간 (KST = UTC+9)
    # cron 요일: 0=일, 1=월, ..., 6=토
    # 18시 선택 이유: Firestore Spark 일일 quota는 매일 자정 PT (≈17시 KST)에 리셋되므로,
    # 17시 이후로 잡아야 그 날 누적된 read 한도와 충돌 안 함
    - cron: '0 9 * * 6'
  workflow_dispatch:  # 수동 실행 버튼 (테스트용)

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run weekly backup
        working-directory: scripts
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BACKUP_RECIPIENT: ${{ secrets.BACKUP_RECIPIENT }}
        run: node weekly-backup.js
