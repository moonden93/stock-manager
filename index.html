<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif; }
  .tab-btn { transition: all 0.15s; }
  .tab-btn.active { background: #0d9488; color: white; }
  .tab-btn:not(.active) { background: white; color: #475569; border: 1px solid #e2e8f0; }
  .tab-btn:not(.active):hover { background: #f1f5f9; }
  .big-btn {

    border-radius: 12px; transition: all 0.15s; cursor: pointer; border: none;
  }
  .big-btn:active { transform: scale(0.97); }
  @keyframes slideIn { from { transform: translate(-50%, -100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  .toast { animation: slideIn 0.3s ease-out; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }

<body class="bg-slate-50">

<!-- 헤더 -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-3">
    <div class="flex items-center justify-between mb-3">

        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-900">문치과병원 재고관리</h1>
          <p class="text-xs text-slate-500" id="header-stats">로딩 중...</p>
          <p class="text-[10px] mt-0.5" id="firebase-status">
            <span class="text-slate-400">⚪ 연결 확인 중...</span>
          </p>
        </div>
      </div>
      <button onclick="showHelp()" class="px-3 py-1.5 text-sm bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-700">❓ 도움말</button>
    </div>

    <div class="grid grid-cols-5 gap-1.5">
      <button onclick="switchTab('release')" id="tab-release" class="tab-btn active w-full py-2.5 rounded-xl font-bold text-xs sm:text-sm flex flex-col sm:flex-row items-center justify-center gap-1">
        <span>📤</span><span>요청</span>
      </button>
      <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn w-full py-2.5 rounded-xl font-bold text-xs sm:text-sm flex flex-col sm:flex-row items-center justify-center gap-1">
        <span>📊</span><span>통계</span>
      </button>
      <button onclick="switchTab('manage')" id="tab-manage" class="tab-btn w-full py-2.5 rounded-xl font-bold text-xs sm:text-sm flex flex-col sm:flex-row items-center justify-center gap-1">
        <span>🔒</span><span>반출관리</span>
      </button>
      <button onclick="switchTab('inbound')" id="tab-inbound" class="tab-btn w-full py-2.5 rounded-xl font-bold text-xs sm:text-sm flex flex-col sm:flex-row items-center justify-center gap-1">
        <span>🔒</span><span>입고</span>

      <button onclick="switchTab('inventory')" id="tab-inventory" class="tab-btn w-full py-2.5 rounded-xl font-bold text-xs sm:text-sm flex flex-col sm:flex-row items-center justify-center gap-1">

    </div>
    <div class="mt-1.5">
      <button onclick="switchTab('settings')" id="tab-settings" class="tab-btn w-full py-2 rounded-xl font-bold text-xs sm:text-sm flex items-center justify-center gap-1">
        <span>⚙️</span><span>설정 (팀/담당자/품목 관리)</span>

</header>

<!-- 6. Firebase SDK (모든 JS 로드 후) -->
<!-- 동적 import + try/catch: 모듈 import 실패(네트워크/CSP/구형 브라우저) 시
     화면에 에러를 표시해서 "왜 동기화 안 되는지" 사용자가 즉시 알 수 있게 함.
     기존엔 실패 시 firebaseReady가 영영 true가 안 돼서 단서 없이 오프라인처럼 동작했음. -->
<script type="module">
  (async () => {
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js");
      const { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp, collection, addDoc, query, orderBy, limit, getDocs, deleteDoc, writeBatch, increment } = await import("https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js");

      const firebaseConfig = {
        apiKey: "AIzaSyCTbS9JLCiGIjqviYrW5_KMIZOSA95oYSU",
        authDomain: "moon-dental-stock.firebaseapp.com",
        projectId: "moon-dental-stock",
        storageBucket: "moon-dental-stock.firebasestorage.app",
        messagingSenderId: "630268704768",
        appId: "1:630268704768:web:06c0da645ed160ce1c40e5"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.firebaseDB = db;
      window.firebaseDoc = doc;
      window.firebaseGetDoc = getDoc;
      window.firebaseSetDoc = setDoc;
      window.firebaseOnSnapshot = onSnapshot;
      window.firebaseServerTimestamp = serverTimestamp;
      // Phase 1: events/ 컬렉션 — append-only audit log
      window.firebaseCollection = collection;
      window.firebaseAddDoc = addDoc;
      window.firebaseQuery = query;
      window.firebaseOrderBy = orderBy;
      window.firebaseLimit = limit;
      window.firebaseGetDocs = getDocs;
      window.firebaseDeleteDoc = deleteDoc;
      window.firebaseWriteBatch = writeBatch;
      window.firebaseIncrement = increment;
      window.firebaseReady = true;

      window.dispatchEvent(new Event('firebaseReady'));
    } catch (err) {
      console.error('❌ Firebase 초기화 실패:', err);
      window.firebaseInitError = (err && err.message) ? err.message : String(err);
      window.dispatchEvent(new Event('firebaseError'));
    }
  })();
</script>

<!-- 7. PWA Service Worker 등록 (오프라인 캐시) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('service-worker.js').catch(function(err) {
        console.warn('Service worker 등록 실패:', err);
      });
    });
  }
</script>
